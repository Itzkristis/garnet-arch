# garnet sway config additions — append these to ~/.config/sway/config for the
# alarm user (the base config is Arch's default /etc/sway/config, copied on
# first setup). Deployed by hand, not templated, because it lives in the user's
# home. See INSTALLATION.md ("The graphical desktop", "On-screen keyboard",
# "Keyboard shortcuts").

# --- On-screen keyboard -----------------------------------------------------
# squeekboard reads its letter layout from this gsettings key; on a non-GNOME
# system it is empty ("No system layout present") and the OSK has nothing to
# show. Set it, then autostart squeekboard.
exec gsettings set org.gnome.desktop.input-sources sources "[('xkb', 'us')]"
exec squeekboard

# Volume-Up toggles the on-screen keyboard. squeekboard's auto-show is
# unreliable here (the seat looks like it has a hardware keyboard: the volume
# button + the touch panel's KEY_POWER/WAKEUP gesture keys). The power button
# is PMIC-managed and never reaches Linux, so Volume-Up is the toggle.
bindsym --no-repeat XF86AudioRaiseVolume exec /usr/local/bin/toggle-osk

# --- App shortcuts ----------------------------------------------------------
# Alt = Mod1 (sway's own $mod is Super/Mod4). These need a real/OTG keyboard.
# Add your own the same way — see the mini-tutorial in INSTALLATION.md.
bindsym Mod1+t exec foot       # Alt+t → terminal
bindsym Mod1+w exec firefox    # Alt+w → Firefox
