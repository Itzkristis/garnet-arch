# Blacklist modules whose udev coldplug (arbitrary order) crashes the SoC or
# must be started in a controlled sequence by our services instead.
# Wi-Fi remoteproc chain (loaded by garnet-wifi-fw.service):
blacklist icnss2
blacklist qcom_q6v5_pas
# USB phy/controller (loaded in strict order by garnet-usb-gadget.service):
blacklist phy-msm-snps-hs
blacklist phy-msm-ssusb-qmp
blacklist extcon-fake-vbus
blacklist dwc3-msm
