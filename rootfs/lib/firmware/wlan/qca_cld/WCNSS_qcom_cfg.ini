# qcacld-3.0 runtime ini — path is WLAN_INI_FILE for an MSM_PLATFORM build:
#   /lib/firmware/wlan/qca_cld/WCNSS_qcom_cfg.ini
#
# THE Wi-Fi fix. Our qcacld build compiles ONLY the fastpath TX path
# (ol_tx_ll_fastpath.c). Its ol_tx_ll_wrapper() needs the runtime switch
# gEnableFastPath, which DEFAULTS TO FALSE. Without it every host TX frame
# (including EAPOL 2/4) is silently dropped -> the 4-way handshake fails with a
# bogus "pre-shared key may be incorrect" even though the PSK is correct.
# Android ships this ini in /vendor/etc/wifi; a bare Arch rootfs has none.
gEnableFastPath=1

# Open all qcacld console log levels — only useful for future debugging;
# qcacld's own logging is otherwise a black hole (use ftrace/kprobes instead).
wlanConsoleLogLevelsBitmap=0x3f
